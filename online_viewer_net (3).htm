<!DOCTYPE html>
<html>
<head>
    <title>Robotics Magazine</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        img {
            display: block;
            margin: 20px auto;
        }
        .letters-vertical {
            display: flex;
            flex-direction: column; /* stack letters vertically */
            align-items: flex-start; /* align to left */
            font-size: 3em; /* bigger letters */
            font-weight: bold;
            color: white;
            gap: 10px; /* spacing between letters */
            position: fixed; /* stays on the left side when scrolling */
            top: 100px; /* distance from top of page */
            left: 20px; /* distance from left edge */
        }
        model-viewer {
            display: block;
            margin: 50px auto 20px auto; /* center horizontally */
        }
        .buttons {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .buttons a {
            display: inline-block;
            padding: 10px 20px;
            background-color: white;
            color: black;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
        }
        .buttons a:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h1>LSSASSOCIATED.COM</h1>

<img src="https://i.imghippo.com/files/U8509UE.png" alt="Uploaded image on Imghippo" width="100" height="100">

<!-- Letters stacked vertically on the left -->
<div class="letters-vertical">
    <span>R</span>
    <span>O</span>
    <span>B</span>
    <span>O</span>
    <span>T</span>
    <span>I</span>
    <span>C</span>
    <span>S</span>
</div>

<!-- 3D magazine -->
<model-viewer
    src="robotics-magazine.glb"
    camera-controls
    auto-rotate
    style="width:600px; height:400px;">
</model-viewer>

<!-- Buttons -->
<div class="buttons">
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://trapcat1440.github.io/VoyagerTheGame/" target="_blank">LSS Game</a>
</div>

</body>
</html>
